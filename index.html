<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0c1014" />
    <title>DrillBoard</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0c1014; overflow: hidden; }
      /* Safe-area layout (iPhone / Dynamic Island / iOS 26 standalone).
         iOS 26.x composites an opaque system band over standalone web
         apps in the home-indicator region — content cannot render there,
         so the ice ends above it, mirroring the island inset at the top.
         Mirrors the intended rules in src/hockey-drill-animator.jsx. */
      .hd-root {
        /* anchor to every viewport edge — vh/dvh under-report in iOS
           standalone mode and must not be trusted for full-screen fill */
        top: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        left: 0 !important;
        width: auto !important;
        height: auto !important;
      }
      .hd-stage {
        top: env(safe-area-inset-top, 0px) !important;
        left: env(safe-area-inset-left, 0px) !important;
        right: env(safe-area-inset-right, 0px) !important;
        bottom: env(safe-area-inset-bottom, 0px) !important;
      }
      .hd-tl, .hd-tr, .hd-tr2 {
        top: max(10px, env(safe-area-inset-top)) !important;
      }
      .hd-menu.tl {
        top: calc(max(10px, env(safe-area-inset-top)) + 52px) !important;
      }
    </style>
    <script>
      /* On-screen diagnostics: load with ?debug in the URL */
      (function () {
        if (!/debug/.test(location.search)) return;
        var isStandalone =
          navigator.standalone === true ||
          (window.matchMedia && matchMedia("(display-mode: standalone)").matches);
        document.addEventListener("DOMContentLoaded", function () {
          var d = document.createElement("div");
          d.style.cssText =
            "position:fixed;left:8px;top:120px;z-index:9999;" +
            "background:rgba(0,0,0,.78);color:#7CFC00;font:11px ui-monospace,monospace;" +
            "padding:6px 8px;border-radius:6px;pointer-events:none;white-space:pre";
          document.body.appendChild(d);
          var probe = document.createElement("div");
          probe.style.cssText =
            "position:fixed;visibility:hidden;" +
            "padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)";
          document.body.appendChild(probe);
          setInterval(function () {
            var cs = getComputedStyle(probe);
            var vv = window.visualViewport;
            var root = document.querySelector(".hd-root");
            var stage = document.querySelector(".hd-stage");
            var ice = document.querySelector(".hd-canvas");
            var r = function (el) {
              if (!el) return "n/a";
              var b = el.getBoundingClientRect();
              return Math.round(b.height) + " bot" + Math.round(b.bottom);
            };
            d.textContent =
              "mode   " + (isStandalone ? "standalone" : "browser") +
              "\ninner  " + innerWidth + "x" + innerHeight +
              "\nvv     " + (vv ? Math.round(vv.width) + "x" + Math.round(vv.height) + " ot" + Math.round(vv.offsetTop) : "n/a") +
              "\nscreen " + screen.width + "x" + screen.height +
              "\nsafe   t" + cs.paddingTop + " b" + cs.paddingBottom +
              "\nroot   " + r(root) +
              "\nstage  " + r(stage) +
              "\nice    " + r(ice);
          }, 500);
        });
      })();
    </script>
  </head>
  <body style="margin: 0; background: #0c1014">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
