TITLE Chip Off the Boards, Behind the D
DESC F1 banks a chip off the boards past the standing-up D and picks it up behind him in the neutral zone.
NOTES
| ## Coaching points
|
| A **delayed** neutral-zone entry that beats a standing-up D with a chip.
|
| 1. F1 carries hard up the wall to draw the D up.
| 2. **Chip** off the glass past the D (aim `~-60`).
| 3. Slip inside and re-gather behind him — still onside.
|
| - Cue: *sell the carry* before the chip.
| - Reps: 3 each side, then add a backchecker.
END NOTES

PIECE D1 player 110 20 #1f4fa3 D1 defense
PIECE F1 player 46 26 F1
PATH F1 L 80,14 DESC "Chip off glass" SHOW label OFF -22,16 L 100,12 DESC "Pickup behind D" SHOW label OFF 8,13 L 120,26
PIECE L1 label 100 73 "Neutral-zone regroup"
PIECE PK1 puck 46 26 on=F1 chip=2:F1@3~-60
STEP at=0 "**F1** carries hard up the wall"

<script>
const VIEWS = { full:[0,0,200,85], half:[100,0,100,85], quarter:[100,0,100,42.5] };
const RINK = { W:200, H:85 };
const DSL_VERSION = 3;

// Rink boards: a rounded-rectangle boundary the puck can rim along or bounce
// off. Coordinates are rink feet (x 0..200, y 0..85). The puck-center boundary
// is inset slightly from the painted board line so the puck rides the boards.

const X0 = 2.5, X1 = 197.5, Y0 = 2.5, Y1 = 82.5, R = 23;
const cxL = X0 + R, cxR = X1 - R, cyT = Y0 + R, cyB = Y1 - R;
const HALF = Math.PI / 2;
const W = cxR - cxL, H = cyB - cyT, A = HALF * R;
const PERIM = 2 * W + 2 * H + 4 * A;

// perimeter, clockwise from the top-left tangent point
const S = [];
let acc = 0;
const line = (ax, ay, ux, uy, len) => { S.push({ s0: acc, len, kind: "line", ax, ay, ux, uy }); acc += len; };
const arc = (cx, cy, a0) => { S.push({ s0: acc, len: A, kind: "arc", cx, cy, a0 }); acc += A; };
line(cxL, Y0, 1, 0, W);      // top
arc(cxR, cyT, -HALF);        // top-right corner
line(X1, cyT, 0, 1, H);      // right
arc(cxR, cyB, 0);            // bottom-right
line(cxR, Y1, -1, 0, W);     // bottom
arc(cxL, cyB, HALF);         // bottom-left
line(X0, cyB, 0, -1, H);     // left
arc(cxL, cyT, Math.PI);      // top-left

function isInside(x, y) {
  if (x < X0 || x > X1 || y < Y0 || y > Y1) return false;
  if (x < cxL && y < cyT) return Math.hypot(x - cxL, y - cyT) <= R;
  if (x > cxR && y < cyT) return Math.hypot(x - cxR, y - cyT) <= R;
  if (x > cxR && y > cyB) return Math.hypot(x - cxR, y - cyB) <= R;
  if (x < cxL && y > cyB) return Math.hypot(x - cxL, y - cyB) <= R;
  return true;
}

// nearest boundary point + inward unit normal
function nearest(x, y) {
  let cx = null, cy = null;
  if (x < cxL && y < cyT) { cx = cxL; cy = cyT; }
  else if (x > cxR && y < cyT) { cx = cxR; cy = cyT; }
  else if (x > cxR && y > cyB) { cx = cxR; cy = cyB; }
  else if (x < cxL && y > cyB) { cx = cxL; cy = cyB; }
  if (cx != null) {
    const dx = x - cx, dy = y - cy, d = Math.hypot(dx, dy) || 1;
    return { x: cx + (dx / d) * R, y: cy + (dy / d) * R, nx: -dx / d, ny: -dy / d };
  }
  const dTop = y - Y0, dBot = Y1 - y, dLeft = x - X0, dRight = X1 - x;
  const m = Math.min(dTop, dBot, dLeft, dRight);
  if (m === dTop) return { x, y: Y0, nx: 0, ny: 1 };
  if (m === dBot) return { x, y: Y1, nx: 0, ny: -1 };
  if (m === dLeft) return { x: X0, y, nx: 1, ny: 0 };
  return { x: X1, y, nx: -1, ny: 0 };
}

function clampInside(x, y) {
  if (isInside(x, y)) return { x, y };
  const n = nearest(x, y);
  return { x: n.x, y: n.y };
}

// keep a moving puck inside the boards, reflecting its velocity off them
function contain(x, y, vx, vy, restitution = 0.7) {
  if (isInside(x, y)) return { x, y, vx, vy, hit: false };
  const n = nearest(x, y);
  const dot = vx * n.nx + vy * n.ny;                 // n is the inward normal
  if (dot < 0) { vx = (vx - 2 * dot * n.nx) * restitution; vy = (vy - 2 * dot * n.ny) * restitution; }
  return { x: n.x, y: n.y, vx, vy, hit: true };
}

// unit tangent along the boards near a point, pointing toward `toward`
function tangentToward(from, toward) {
  const s = project(from).s;
  const a = pointAt(s + 3), b = pointAt(s - 3);
  const pick = Math.hypot(a.x - toward.x, a.y - toward.y) < Math.hypot(b.x - toward.x, b.y - toward.y) ? a : b;
  const dx = pick.x - from.x, dy = pick.y - from.y, m = Math.hypot(dx, dy) || 1;
  return { x: dx / m, y: dy / m };
}

// distance from a point to the nearest board
const edgeDist = (x, y) => { const p = project({ x, y }); return Math.hypot(p.x - x, p.y - y); };

function pointAt(s) {
  s = ((s % PERIM) + PERIM) % PERIM;
  for (const g of S) {
    if (s <= g.s0 + g.len + 1e-9) {
      const local = s - g.s0;
      if (g.kind === "line") return { x: g.ax + g.ux * local, y: g.ay + g.uy * local };
      const ang = g.a0 + (local / g.len) * HALF;
      return { x: g.cx + Math.cos(ang) * R, y: g.cy + Math.sin(ang) * R };
    }
  }
  return { x: S[0].ax, y: S[0].ay };
}

// nearest boundary location (arc-length s + point) to an arbitrary point
function project(p) {
  let best = null;
  for (const g of S) {
    let proj, s;
    if (g.kind === "line") {
      let t = (p.x - g.ax) * g.ux + (p.y - g.ay) * g.uy;
      t = Math.max(0, Math.min(g.len, t));
      proj = { x: g.ax + g.ux * t, y: g.ay + g.uy * t }; s = g.s0 + t;
    } else {
      let d = (((Math.atan2(p.y - g.cy, p.x - g.cx) - g.a0) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      if (d > HALF) d = d - HALF < 2 * Math.PI - d ? HALF : 0;   // clamp onto the quarter
      const aa = g.a0 + d;
      proj = { x: g.cx + Math.cos(aa) * R, y: g.cy + Math.sin(aa) * R }; s = g.s0 + (d / HALF) * g.len;
    }
    const dist = Math.hypot(p.x - proj.x, p.y - proj.y);
    if (!best || dist < best.dist) best = { dist, s, x: proj.x, y: proj.y };
  }
  return best;
}

// how far along the boards to aim the entry so the puck meets them at a shallow
// angle instead of driving straight in and turning 90°
const leadOf = (from, sF) => Math.min(Math.hypot(from.x - sF.x, from.y - sF.y) * 2.1, 52);
const segAt = s => { s = ((s % PERIM) + PERIM) % PERIM; for (const g of S) if (s <= g.s0 + g.len + 1e-9) return g; return S[S.length - 1]; };
// room left on the current straight/arc ahead in direction `dir`
const roomAhead = (s, dir) => { const g = segAt(s); return dir > 0 ? g.s0 + g.len - s : s - g.s0; };

// polyline that rims from `from` to `to` the short way around the boards
function rimPath(from, to) {
  const sF = project(from), sT = project(to);
  const dPlus = (((sT.s - sF.s) % PERIM) + PERIM) % PERIM;
  const dir = dPlus <= PERIM - dPlus ? 1 : -1;
  const origTotal = dir > 0 ? dPlus : PERIM - dPlus;
  // keep the entry on the same board section as the nearest point (no corner wrap)
  const lead = Math.min(leadOf(from, sF), origTotal * 0.5, roomAhead(sF.s, dir));
  const entryS = sF.s + dir * lead;
  const total = origTotal - lead;
  const pts = [{ x: from.x, y: from.y }, pointAt(entryS)];
  for (let d = 3; d < total; d += 3) pts.push(pointAt(entryS + dir * d));
  pts.push({ x: sT.x, y: sT.y }, { x: to.x, y: to.y });
  return pts;
}

// polyline that rims `dist` ft around the boards. `aim` (deg) picks which way it
// rims (the board direction closest to the aim); without it, the long way along
// the nearest board so the entry stays shallow and doesn't cut across a corner
function rimAround(from, dist, aim) {
  const sF = project(from);
  let dir;
  if (aim != null) {
    const ax = Math.cos((aim * Math.PI) / 180), ay = Math.sin((aim * Math.PI) / 180);
    const p1 = pointAt(sF.s + 4), p2 = pointAt(sF.s - 4);
    dir = (p1.x - sF.x) * ax + (p1.y - sF.y) * ay >= (p2.x - sF.x) * ax + (p2.y - sF.y) * ay ? 1 : -1;
  } else {
    dir = roomAhead(sF.s, 1) >= roomAhead(sF.s, -1) ? 1 : -1;  // more straight ahead
  }
  const lead = Math.min(leadOf(from, sF), Math.max(0, roomAhead(sF.s, dir) - 1));
  const entryS = sF.s + dir * lead;
  const pts = [{ x: from.x, y: from.y }, pointAt(entryS)];
  for (let d = 3; d <= dist; d += 3) pts.push(pointAt(entryS + dir * d));
  return pts;
}

// rim along the boards in the `aim` direction and stop at the point nearest a
// collector's `target` — the aimed hard rim adjusts its distance to the pickup
function rimTo(from, aim, target, maxDist = 260) {
  const sF = project(from);
  const ax = Math.cos((aim * Math.PI) / 180), ay = Math.sin((aim * Math.PI) / 180);
  const p1 = pointAt(sF.s + 4), p2 = pointAt(sF.s - 4);
  const dir = (p1.x - sF.x) * ax + (p1.y - sF.y) * ay >= (p2.x - sF.x) * ax + (p2.y - sF.y) * ay ? 1 : -1;
  const lead = Math.min(leadOf(from, sF), Math.max(0, roomAhead(sF.s, dir) - 1));
  const entryS = sF.s + dir * lead;
  const pts = [{ x: from.x, y: from.y }, pointAt(entryS)];
  let best = { d: Infinity, idx: 1 };
  for (let d = 3; d <= maxDist; d += 3) {
    const p = pointAt(entryS + dir * d); pts.push(p);
    const dist = Math.hypot(p.x - target.x, p.y - target.y);
    if (dist < best.d) best = { d: dist, idx: pts.length - 1 };
    else if (dist > best.d + 12) break;   // clearly past the closest approach
  }
  const out = pts.slice(0, best.idx + 1);
  out.push({ x: target.x, y: target.y });
  return out;
}

// polyline of a puck sliding `dist` ft from a point, reflecting off the boards
function slide(x, y, ux, uy, dist) {
  let m = Math.hypot(ux, uy) || 1; ux /= m; uy /= m;
  let cx = x, cy = y, rem = dist, guard = 0;
  const pts = [{ x, y }];
  while (rem > 0.5 && guard++ < 16) {
    const tHit = rayHit(cx, cy, ux, uy, rem);
    if (tHit >= rem) { cx += ux * rem; cy += uy * rem; pts.push({ x: cx, y: cy }); break; }
    cx += ux * tHit; cy += uy * tHit; pts.push({ x: cx, y: cy });
    const n = nearest(cx, cy), dot = ux * n.nx + uy * n.ny;   // reflect off the boards
    ux -= 2 * dot * n.nx; uy -= 2 * dot * n.ny;
    rem -= Math.max(tHit, 0.5);
  }
  return pts;
}
function rayHit(x, y, ux, uy, max) {
  for (let t = 0.5; t <= max; t += 0.5) if (!isInside(x + ux * t, y + uy * t)) return t - 0.5;
  return max;
}

// a chip fired along (ux,uy) that banks off the boards and travels only as far
// as needed to reach `target` — the distance auto-adjusts to the pickup spot,
// so aiming into the boards banks it there. Returns the polyline (ends at target).
function slideTo(x, y, ux, uy, target, maxDist = 130) {
  const v = slide(x, y, ux, uy, maxDist);
  let best = { d: Infinity, seg: 1 };
  for (let k = 1; k < v.length; k++) {
    const a = v[k - 1], b = v[k];
    const vx = b.x - a.x, vy = b.y - a.y, L2 = vx * vx + vy * vy || 1;
    const s = Math.max(0, Math.min(1, ((target.x - a.x) * vx + (target.y - a.y) * vy) / L2));
    const d = Math.hypot(target.x - (a.x + vx * s), target.y - (a.y + vy * s));
    if (d < best.d) best = { d, seg: k };
  }
  const pts = v.slice(0, best.seg);   // bank vertices before the closest approach
  pts.push({ x: target.x, y: target.y });
  return pts;
}


const boards = { isInside, clampInside, contain, tangentToward, edgeDist, pointAt, project, rimPath, rimAround, rimTo, slide, slideTo, PERIM };

// Bezier & route geometry: evaluation, subdivision, zigzags, sketch fitting.


/* ---------------- geometry ---------------- */

const clampX = v => Math.max(0, Math.min(RINK.W, v));
const clampY = v => Math.max(0, Math.min(RINK.H, v));
const segEnd = (p, i) => (i < 0 ? { x: p.x, y: p.y } : { x: p.path[i].x, y: p.path[i].y });

function segD(prev, s) {
  if (s.type === "L") return `M ${prev.x} ${prev.y} L ${s.x} ${s.y}`;
  if (s.type === "Q") return `M ${prev.x} ${prev.y} Q ${s.cx} ${s.cy} ${s.x} ${s.y}`;
  return `M ${prev.x} ${prev.y} C ${s.c1x} ${s.c1y} ${s.c2x} ${s.c2y} ${s.x} ${s.y}`;
}

function evalSeg(prev, s, t) {
  const u = 1 - t;
  if (s.type === "L") return { x: prev.x + t * (s.x - prev.x), y: prev.y + t * (s.y - prev.y) };
  if (s.type === "Q") return {
    x: u * u * prev.x + 2 * u * t * s.cx + t * t * s.x,
    y: u * u * prev.y + 2 * u * t * s.cy + t * t * s.y,
  };
  return {
    x: u * u * u * prev.x + 3 * u * u * t * s.c1x + 3 * u * t * t * s.c2x + t * t * t * s.x,
    y: u * u * u * prev.y + 3 * u * u * t * s.c1y + 3 * u * t * t * s.c2y + t * t * t * s.y,
  };
}

function segTangentAngle(prev, s, t) {
  const a = evalSeg(prev, s, Math.max(0, t - 0.02));
  const b = evalSeg(prev, s, Math.min(1, t + 0.02));
  return (Math.atan2(b.y - a.y, b.x - a.x) * 180) / Math.PI || 0;
}

function nearestT(prev, s, pt) {
  let best = 0.5, bd = Infinity;
  for (let i = 0; i <= 60; i++) {
    const t = i / 60;
    const q = evalSeg(prev, s, t);
    const d = (q.x - pt.x) ** 2 + (q.y - pt.y) ** 2;
    if (d < bd) { bd = d; best = t; }
  }
  return Math.min(0.92, Math.max(0.08, best));
}

// de Casteljau subdivision: split one segment into two at t without
// changing the curve's shape
function splitSeg(prev, s, t) {
  const lerp = (a, b) => ({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t });
  const meta = { mode: s.mode || "carry", dir: s.dir || "fwd", rate: s.rate || 1 };
  if (s.type === "L") {
    const B = evalSeg(prev, s, t);
    return [
      { type: "L", ...meta, stop: s.stop || 0, x: B.x, y: B.y },
      { type: "L", ...meta, stop: 0, x: s.x, y: s.y },
    ];
  }
  if (s.type === "Q") {
    const C = { x: s.cx, y: s.cy }, P1 = { x: s.x, y: s.y };
    const q0 = lerp(prev, C), q1 = lerp(C, P1), B = lerp(q0, q1);
    return [
      { type: "Q", ...meta, stop: s.stop || 0, cx: q0.x, cy: q0.y, x: B.x, y: B.y },
      { type: "Q", ...meta, stop: 0, cx: q1.x, cy: q1.y, x: s.x, y: s.y },
    ];
  }
  const c1 = { x: s.c1x, y: s.c1y }, c2 = { x: s.c2x, y: s.c2y }, P1 = { x: s.x, y: s.y };
  const p01 = lerp(prev, c1), p12 = lerp(c1, c2), p23 = lerp(c2, P1);
  const p012 = lerp(p01, p12), p123 = lerp(p12, p23), B = lerp(p012, p123);
  return [
    { type: "C", ...meta, stop: s.stop || 0, c1x: p01.x, c1y: p01.y, c2x: p012.x, c2y: p012.y, x: B.x, y: B.y },
    { type: "C", ...meta, stop: 0, c1x: p123.x, c1y: p123.y, c2x: p23.x, c2y: p23.y, x: s.x, y: s.y },
  ];
}

// `ar` is the rink→screen aspect ratio (Sx/Sy). The zigzag's bump direction and
// spacing are computed in stretched "screen" space so the pattern still reads as
// even, upright squiggles after the fill-mode stretch (ar=1 → no correction).
// a smooth sine "wiggle" along a segment — the hockey convention for skating
// WITH the puck. Whole cycles so it starts/ends on the line (connects cleanly).
// taperEnd flattens the wiggle over the final stretch so the line runs straight
// into the end arrowhead (no bump poking through it) — pass it only on the
// segment that carries the route's arrowhead.
function wigglePoints(prev, s, ar = 1, taperEnd = false) {
  const wlen = (ax, ay, bx, by) => Math.hypot((bx - ax) * ar, by - ay);
  const approx =
    s.type === "L" ? wlen(prev.x, prev.y, s.x, s.y)
    : s.type === "Q" ? wlen(prev.x, prev.y, s.cx, s.cy) + wlen(s.cx, s.cy, s.x, s.y)
    : wlen(prev.x, prev.y, s.c1x, s.c1y) + wlen(s.c1x, s.c1y, s.c2x, s.c2y) + wlen(s.c2x, s.c2y, s.x, s.y);
  const cycles = Math.max(1, Math.round(approx / 3.4));   // ~3.4 screen units per wave
  const n = Math.max(14, cycles * 10), A = 0.85;          // amplitude in screen units
  const TAPER = 5;                                         // screen units of straight line under the arrowhead
  const pts = [];
  let cum = 0, prevPt = evalSeg(prev, s, 0);
  for (let i = 0; i <= n; i++) {
    const t = i / n, pt = evalSeg(prev, s, t);
    if (i > 0) cum += wlen(prevPt.x, prevPt.y, pt.x, pt.y);
    prevPt = pt;
    if (i === 0 || i === n) { pts.push(pt); continue; }
    const ahead = evalSeg(prev, s, Math.min(1, t + 0.005));
    const tx = (ahead.x - pt.x) * ar, ty = ahead.y - pt.y;   // screen-space tangent
    const px = -ty, py = tx, l = Math.hypot(px, py) || 1;    // screen-space normal
    const taper = taperEnd ? Math.min(1, (approx - cum) / TAPER) : 1;
    const a = Math.sin((cum / (approx || 1)) * cycles * 2 * Math.PI) * A * taper;
    pts.push({ x: pt.x + (px / l) * a / ar, y: pt.y + (py / l) * a });
  }
  return pts.map(q => `${q.x.toFixed(2)},${q.y.toFixed(2)}`).join(" ");
}

function zigzagPoints(prev, s, ar = 1) {
  // arc length measured in aspect-weighted space (x scaled by ar) so bump
  // spacing stays uniform on screen regardless of the segment's direction
  const wlen = (ax, ay, bx, by) => Math.hypot((bx - ax) * ar, by - ay);
  const approx =
    s.type === "L" ? wlen(prev.x, prev.y, s.x, s.y)
    : s.type === "Q" ? wlen(prev.x, prev.y, s.cx, s.cy) + wlen(s.cx, s.cy, s.x, s.y)
    : wlen(prev.x, prev.y, s.c1x, s.c1y) + wlen(s.c1x, s.c1y, s.c2x, s.c2y) + wlen(s.c2x, s.c2y, s.x, s.y);
  const n = Math.max(6, Math.round(approx / 2.4));
  const A = 0.9;                                   // bump amplitude, in screen units
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const pt = evalSeg(prev, s, t);
    if (i === 0 || i === n) { pts.push(pt); continue; }
    const ahead = evalSeg(prev, s, Math.min(1, t + 0.01));
    // perpendicular to the on-SCREEN tangent, then mapped back to rink coords
    const tx = (ahead.x - pt.x) * ar, ty = ahead.y - pt.y;   // screen-space tangent
    const px = -ty, py = tx;                                 // screen-space normal
    const l = Math.hypot(px, py) || 1;
    const a = (i % 2 ? 1 : -1) * A;
    pts.push({ x: pt.x + (px / l) * a / ar, y: pt.y + (py / l) * a });
  }
  return pts.map(q => `${q.x.toFixed(2)},${q.y.toFixed(2)}`).join(" ");
}

function convertSeg(seg, prev) {
  const { x, y, mode = "carry", dir = "fwd", stop = 0, rate = 1 } = seg;
  const nx = -(y - prev.y), ny = x - prev.x;
  const len = Math.hypot(nx, ny) || 1;
  const off = 12;
  if (seg.type === "L") return { type: "L", mode, dir, stop, rate, x, y };
  if (seg.type === "Q")
    return {
      type: "Q", mode, dir, stop, rate,
      cx: clampX((prev.x + x) / 2 + (nx / len) * off),
      cy: clampY((prev.y + y) / 2 + (ny / len) * off), x, y,
    };
  return {
    type: "C", mode, dir, stop, rate,
    c1x: clampX(prev.x + (x - prev.x) / 3 + (nx / len) * off),
    c1y: clampY(prev.y + (y - prev.y) / 3 + (ny / len) * off),
    c2x: clampX(prev.x + (2 * (x - prev.x)) / 3 - (nx / len) * off),
    c2y: clampY(prev.y + (2 * (y - prev.y)) / 3 - (ny / len) * off),
    x, y,
  };
}

/* ---- finger drawing ---- */

function rdp(pts, eps) {
  if (pts.length < 3) return pts.slice();
  const [a, b] = [pts[0], pts[pts.length - 1]];
  let maxD = 0, idx = 0;
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.hypot(dx, dy) || 1e-9;
  for (let i = 1; i < pts.length - 1; i++) {
    const d = Math.abs(dy * pts[i].x - dx * pts[i].y + b.x * a.y - b.y * a.x) / len;
    if (d > maxD) { maxD = d; idx = i; }
  }
  if (maxD <= eps) return [a, b];
  return [...rdp(pts.slice(0, idx + 1), eps).slice(0, -1), ...rdp(pts.slice(idx), eps)];
}

function catmullToBezier(pts) {
  const segs = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)], p1 = pts[i], p2 = pts[i + 1], p3 = pts[Math.min(pts.length - 1, i + 2)];
    segs.push({
      type: "C", mode: "carry", dir: "fwd", stop: 0, rate: 1,
      c1x: clampX(p1.x + (p2.x - p0.x) / 6), c1y: clampY(p1.y + (p2.y - p0.y) / 6),
      c2x: clampX(p2.x - (p3.x - p1.x) / 6), c2y: clampY(p2.y - (p3.y - p1.y) / 6),
      x: p2.x, y: p2.y,
    });
  }
  return segs;
}

function fitRoute(start, raw) {
  const pts = [start];
  raw.forEach(q => {
    const last = pts[pts.length - 1];
    if (Math.hypot(q.x - last.x, q.y - last.y) > 2.2) pts.push(q);
  });
  if (pts.length < 2) return [];
  const simp = pts.length > 3 ? [pts[0], ...rdp(pts.slice(1), 1.6)] : pts;
  const chain = simp.filter((q, i) => i === 0 || Math.hypot(q.x - simp[i - 1].x, q.y - simp[i - 1].y) > 1.5);
  if (chain.length < 2) return [];
  if (chain.length === 2)
    return [{ type: "L", mode: "carry", dir: "fwd", stop: 0, rate: 1, x: chain[1].x, y: chain[1].y }];
  return catmullToBezier(chain);
}



// Nets as solid obstacles. A net's footprint (rink feet) is the cage polygon;
// the MOUTH (front) is open so pucks enter from the front, while the sides and
// back are solid — pucks bounce off them and players route around the whole net.
// Icon units → rink feet uses ICON_SCALE (0.8); coords match icons.jsx.

const ICON = 0.8;
// cage outline in icon units, mouth-top → around the back → mouth-bottom
const LOCAL = [
  [0, -3.75], [-1.7, -3.75], [-3.45, -3.1], [-4.15, -1.5],
  [-4.15, 1.5], [-3.45, 3.1], [-1.7, 3.75], [0, 3.75],
];

// world-space shape for one net piece (+ world↔local transforms)
function netShape(n) {
  const s = (n.size || 1) * ICON;
  const a = ((n.facing || 0) * Math.PI) / 180, c = Math.cos(a), si = Math.sin(a);
  const toWorld = (lx, ly) => ({ x: n.x + lx * s * c - ly * s * si, y: n.y + lx * s * si + ly * s * c });
  const toLocal = (x, y) => { const dx = x - n.x, dy = y - n.y; return { lx: (dx * c + dy * si) / s, ly: (-dx * si + dy * c) / s }; };
  const pts = LOCAL.map(([lx, ly]) => toWorld(lx, ly));
  // solid edges = consecutive pts[0..7]; the mouth edge pts[7]→pts[0] is open
  const solid = [];
  for (let i = 0; i < pts.length - 1; i++) solid.push([pts[i], pts[i + 1]]);
  // a keep-out disc (centroid + radius) that players arc smoothly around
  let cx = 0, cy = 0; for (const p of pts) { cx += p.x; cy += p.y; } cx /= pts.length; cy /= pts.length;
  let r = 0; for (const p of pts) r = Math.max(r, Math.hypot(p.x - cx, p.y - cy));
  return { pts, solid, mouth: [pts[pts.length - 1], pts[0]], toWorld, toLocal, s, cx, cy, r };
}

function netShapes(pieces) {
  return (pieces || []).filter(p => p.kind === "net").map(netShape);
}

// A bumper is a solid rectangular barrier: all four edges are solid (no open
// mouth), so pucks carom off any side and players route around the whole bar.
// It's long along its local x; its faces' normal is perpendicular to `facing`.
const BUMP_HALF_L = 7.7 * ICON;   // half-length, along the bar
const BUMP_HALF_T = 1.55 * ICON;  // half-thickness (a touch proud for the puck radius)
function bumperShape(b) {
  const a = ((b.facing || 0) * Math.PI) / 180, c = Math.cos(a), si = Math.sin(a);
  const toWorld = (lx, ly) => ({ x: b.x + lx * c - ly * si, y: b.y + lx * si + ly * c });
  const corners = [[-BUMP_HALF_L, -BUMP_HALF_T], [BUMP_HALF_L, -BUMP_HALF_T], [BUMP_HALF_L, BUMP_HALF_T], [-BUMP_HALF_L, BUMP_HALF_T]];
  const pts = corners.map(([lx, ly]) => toWorld(lx, ly));
  const solid = [];
  for (let i = 0; i < pts.length; i++) solid.push([pts[i], pts[(i + 1) % pts.length]]); // closed loop — every edge solid
  const r = Math.hypot(BUMP_HALF_L, BUMP_HALF_T);
  // capsule spine (the two ends along the long axis) for player route avoidance
  const spine = [toWorld(-BUMP_HALF_L, 0), toWorld(BUMP_HALF_L, 0)];
  return { pts, solid, mouth: null, cx: b.x, cy: b.y, r, spine, capR: BUMP_HALF_T, bumper: true };
}

function bumperShapes(pieces) {
  return (pieces || []).filter(p => p.kind === "bumper").map(bumperShape);
}

// every solid puck obstacle (nets + bumpers) — pucks carom off these
function solidShapes(pieces) {
  return [...netShapes(pieces), ...bumperShapes(pieces)];
}

// point-in-polygon (cage closed by the mouth)
function inNet(sh, x, y) {
  const p = sh.pts; let inside = false;
  for (let i = 0, j = p.length - 1; i < p.length; j = i++) {
    const xi = p[i].x, yi = p[i].y, xj = p[j].x, yj = p[j].y;
    if ((yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}

// nearest point on a segment to (x,y)
function nearestOnSeg(a, b, x, y) {
  const dx = b.x - a.x, dy = b.y - a.y, l2 = dx * dx + dy * dy || 1;
  let t = ((x - a.x) * dx + (y - a.y) * dy) / l2;
  t = Math.max(0, Math.min(1, t));
  return { x: a.x + dx * t, y: a.y + dy * t, dx, dy };
}

// Slide a point out the nearer SIDE of a net (in the net's local frame), with
// the clearance ramped smoothly over a buffer in front of and behind the cage so
// the detour rounds into an ARC (no sharp V) — and only the net footprint itself
// pushes hard, so a player placed behind the net isn't disturbed. margin (feet).
function avoidNets(shapes, x, y, margin = 1.1) {
  for (const sh of shapes) {
    const { lx, ly } = sh.toLocal(x, y);       // lx: 0 mouth → -4.15 back
    const front = 0, back = -4.15, buf = 2.6;
    if (lx > front + buf || lx < back - buf) continue;
    // depth factor: 1 across the cage, easing to 0 over the front/back buffers
    let f = lx <= front && lx >= back ? 1 : lx > front ? 1 - (lx - front) / buf : 1 - (back - lx) / buf;
    f = Math.max(0, Math.min(1, f));
    f = f * f * (3 - 2 * f);                    // smoothstep → rounded shoulders
    const bound = (3.75 + margin / sh.s) * f;   // lateral clearance at this depth
    if (Math.abs(ly) >= bound) continue;
    const w = sh.toWorld(lx, (ly >= 0 ? 1 : -1) * bound);
    x = w.x; y = w.y;
  }
  return { x, y };
}

// Reroute a sampled polyline so it arcs smoothly AROUND each net's keep-out disc
// instead of cutting through it — a single tangent-in → boundary-arc → tangent-out
// per net, so there's no per-point jitter. Endpoints (incl. a start/end placed
// inside the disc, e.g. behind the net) are preserved.
function detourRoute(points, shapes) {
  let pts = points, changed = false;
  for (const sh of shapes) { const np = aroundDisc(pts, sh.cx, sh.cy, sh.r + 1); if (np !== pts) { pts = np; changed = true; } }
  return changed ? chaikin(chaikin(pts)) : points;   // round the tangent/radial joins
}
// Chaikin corner-cutting (endpoints fixed) — rounds any residual joins
function chaikin(pts) {
  if (pts.length < 3) return pts;
  const out = [pts[0]];
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    if (Math.hypot(b.x - a.x, b.y - a.y) < 1e-6) continue;
    out.push({ x: a.x * 0.75 + b.x * 0.25, y: a.y * 0.75 + b.y * 0.25 });
    out.push({ x: a.x * 0.25 + b.x * 0.75, y: a.y * 0.25 + b.y * 0.75 });
  }
  out.push(pts[pts.length - 1]);
  return out;
}

function segCircleHit(a, b, cx, cy, R) {
  const dx = b.x - a.x, dy = b.y - a.y, fx = a.x - cx, fy = a.y - cy;
  const A = dx * dx + dy * dy, B = 2 * (fx * dx + fy * dy), C = fx * fx + fy * fy - R * R;
  let dis = B * B - 4 * A * C;
  if (dis < 0) return { x: b.x, y: b.y };
  dis = Math.sqrt(dis);
  const t = Math.max(0, Math.min(1, (-B - dis) / (2 * A)));
  return { x: a.x + dx * t, y: a.y + dy * t };
}
// the two tangent points from an external point P to a circle
function tangents(P, cx, cy, R) {
  const dx = P.x - cx, dy = P.y - cy, d = Math.hypot(dx, dy);
  if (d <= R + 1e-6) return [];
  const base = Math.atan2(dy, dx), off = Math.acos(Math.max(-1, Math.min(1, R / d)));
  return [base + off, base - off].map(a => ({ x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R, ang: a }));
}
function arcPts(cx, cy, R, a0, ccw, span) {
  const n = Math.max(4, Math.round(span / 0.12)), out = [];
  for (let k = 0; k <= n; k++) { const a = a0 + (ccw ? 1 : -1) * span * k / n; out.push({ x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R }); }
  return out;
}

function aroundDisc(pts, cx, cy, R) {
  const D = p => Math.hypot(p.x - cx, p.y - cy);
  let i0 = -1, i1 = -1;
  for (let i = 0; i < pts.length; i++) if (D(pts[i]) < R) { if (i0 < 0) i0 = i; i1 = i; }
  if (i0 < 0) return pts;                                    // never enters the disc
  // anchor the tangents well outside the disc (~2.4R) so the route eases in
  // gradually instead of turning hard right at the edge
  const AR = 2.4 * R;
  let ai = i0; while (ai > 0 && D(pts[ai - 1]) < AR) ai--;
  let bi = i1; while (bi < pts.length - 1 && D(pts[bi + 1]) < AR) bi++;
  ai = Math.max(0, ai - 1); bi = Math.min(pts.length - 1, bi + 1);
  const A = pts[ai], B = pts[bi];
  const startInside = D(A) < R, endInside = D(B) < R;
  const ang = p => Math.atan2(p.y - cy, p.x - cx);

  // Prefer a tangent-in → arc → tangent-out path (smooth, no kink at the joins).
  // If an endpoint is inside the disc, that side starts/ends radially instead.
  const TA = startInside ? null : tangents(A, cx, cy, R);
  const TB = endInside ? null : tangents(B, cx, cy, R);
  const startAngs = TA ? TA : [{ ...segCircleHitProj(pts[0], cx, cy, R), fromInside: true }];
  const endAngs = TB ? TB : [{ ...segCircleHitProj(pts[pts.length - 1], cx, cy, R), fromInside: true }];

  let best = null;
  for (const t1 of startAngs) for (const t2 of endAngs) {
    // arc direction follows the A→t1 tangent (radial-out if the start is inside)
    const inx = t1.x - A.x, iny = t1.y - A.y;
    const ccwTan1 = { x: -Math.sin(t1.ang), y: Math.cos(t1.ang) };
    const ccw = t1.fromInside
      ? (-Math.sin(t1.ang) * (B.x - A.x) + Math.cos(t1.ang) * (B.y - A.y)) >= 0
      : (inx * ccwTan1.x + iny * ccwTan1.y) >= 0;
    // require the arc to LEAVE at t2 heading toward B (tangency) unless B is inside
    const exitTan = ccw ? { x: -Math.sin(t2.ang), y: Math.cos(t2.ang) } : { x: Math.sin(t2.ang), y: -Math.cos(t2.ang) };
    const outx = B.x - t2.x, outy = B.y - t2.y;
    if (!t2.fromInside && exitTan.x * outx + exitTan.y * outy < 0) continue;
    let span = ccw ? t2.ang - t1.ang : t1.ang - t2.ang;
    while (span < 0) span += 2 * Math.PI;
    if (span > Math.PI * 1.7) continue;                     // reject wrong-way near-full loops
    const len = Math.hypot(inx, iny) + span * R + Math.hypot(outx, outy);
    if (!best || len < best.len) best = { t1, t2, ccw, span, len };
  }
  if (!best) return pts;
  const arc = arcPts(cx, cy, R, best.t1.ang, best.ccw, best.span);   // includes t1 & t2 as endpoints
  const pre = startInside ? [pts[0]] : pts.slice(0, ai + 1);
  const post = endInside ? [pts[pts.length - 1]] : pts.slice(bi);
  return [...pre, ...arc, ...post];
}
// project a point radially onto the circle (for an endpoint inside the disc)
function segCircleHitProj(p, cx, cy, R) {
  const dx = p.x - cx, dy = p.y - cy, d = Math.hypot(dx, dy) || 1;
  const ang = Math.atan2(dy, dx);
  return { x: cx + Math.cos(ang) * R, y: cy + Math.sin(ang) * R, ang };
}

// does segment a→b cross any net's solid cage (sides/back)? Used to flag a
// rebound whose collection spot sits behind/through a net — it can't get there.
function segCrossesNet(a, b, shapes) {
  for (const sh of shapes || []) for (const [c, d] of sh.solid) if (segInt(a, b, c, d)) return true;
  return false;
}

// segment a→b vs segment c→d intersection; returns { t, x, y } (t along a→b) or null
function segInt(a, b, c, d) {
  const r = { x: b.x - a.x, y: b.y - a.y }, s = { x: d.x - c.x, y: d.y - c.y };
  const den = r.x * s.y - r.y * s.x;
  if (Math.abs(den) < 1e-9) return null;
  const t = ((c.x - a.x) * s.y - (c.y - a.y) * s.x) / den;
  const u = ((c.x - a.x) * r.y - (c.y - a.y) * r.x) / den;
  if (t < 1e-4 || t > 1 || u < 0 || u > 1) return null;
  return { t, x: a.x + r.x * t, y: a.y + r.y * t };
}

// Reflect a travelling polyline off the solid net edges so it bounces instead of
// passing through the sides/back. After a bounce it continues straight for the
// remaining arc length (approximate, but reads as a natural carom). Returns a new
// polyline of the same total length; unchanged if it never hits a net.
function reflectPath(poly, shapes) {
  if (!shapes.length || poly.length < 2) return poly;
  // drop consecutive duplicate points (boards.slide can emit a zero-length first
  // segment when the release is right on the boards) — a zero-length leg would
  // give a (0,0) heading and swallow the whole path
  const dedup = [poly[0]];
  for (let i = 1; i < poly.length; i++) {
    const p = dedup[dedup.length - 1];
    if (Math.hypot(poly[i].x - p.x, poly[i].y - p.y) > 1e-4) dedup.push(poly[i]);
  }
  if (dedup.length < 2) return poly;
  poly = dedup;
  const out = [poly[0]];
  let cur = poly[0];
  // remaining length still to travel along the original polyline
  let remain = 0;
  for (let k = 1; k < poly.length; k++) remain += Math.hypot(poly[k].x - poly[k - 1].x, poly[k].y - poly[k - 1].y);
  // direction of travel at the current point (from the source polyline)
  let idx = 1, next = poly[1];
  let dir = norm(next.x - cur.x, next.y - cur.y);
  let guard = 0;
  while (remain > 0.01 && guard++ < 200) {
    // step target: either the next source vertex (if we're still tracing it) or
    // a straight continuation after a bounce
    const step = Math.min(remain, Math.hypot(next.x - cur.x, next.y - cur.y) || remain);
    const tip = { x: cur.x + dir.x * step, y: cur.y + dir.y * step };
    // nearest solid-edge hit along cur→tip
    let hit = null;
    for (const sh of shapes) for (const [a, b] of sh.solid) {
      const h = segInt(cur, tip, a, b);
      if (h && (!hit || h.t < hit.t)) hit = { ...h, a, b };
    }
    if (hit) {
      out.push({ x: hit.x, y: hit.y });
      const trav = Math.hypot(hit.x - cur.x, hit.y - cur.y);
      remain -= trav;
      // reflect dir about the edge normal
      const ex = hit.b.x - hit.a.x, ey = hit.b.y - hit.a.y, el = Math.hypot(ex, ey) || 1;
      let nx = -ey / el, ny = ex / el;
      const dot = dir.x * nx + dir.y * ny;
      dir = norm(dir.x - 2 * dot * nx, dir.y - 2 * dot * ny);
      // nudge off the wall so we don't immediately re-hit it
      cur = { x: hit.x + dir.x * 0.05, y: hit.y + dir.y * 0.05 };
      next = { x: cur.x + dir.x * remain, y: cur.y + dir.y * remain };  // straight from here on
    } else {
      out.push(tip);
      remain -= step;
      cur = tip;
      if (Math.hypot(next.x - cur.x, next.y - cur.y) < 0.02) {
        // reached this source vertex — advance to the next one
        idx++;
        if (idx < poly.length) { next = poly[idx]; dir = norm(next.x - cur.x, next.y - cur.y); }
      }
    }
  }
  return out;
}

function norm(x, y) { const m = Math.hypot(x, y) || 1; return { x: x / m, y: y / m }; }

// Real-time puck vs nets: if a step from (x,y) to (nx,ny) crosses a net's solid
// edge (its sides/back — the mouth is open), reflect the velocity off that edge
// and stop just short. Returns { x, y, vx, vy, hit }. `rest` = bounce energy kept.
function bounceOffNets(x, y, nx, ny, vx, vy, shapes, rest = 0.72) {
  for (const sh of shapes) {
    for (const [a, b] of sh.solid) {
      const h = segInt({ x, y }, { x: nx, y: ny }, a, b);
      if (!h) continue;
      const ex = b.x - a.x, ey = b.y - a.y, el = Math.hypot(ex, ey) || 1;
      const nlx = -ey / el, nly = ex / el;                 // edge normal
      const dot = vx * nlx + vy * nly;
      // settle just outside the edge, along the normal facing the incoming puck
      const s = dot > 0 ? -1 : 1;
      return {
        x: h.x + nlx * s * 0.4, y: h.y + nly * s * 0.4,
        vx: (vx - 2 * dot * nlx) * rest, vy: (vy - 2 * dot * nly) * rest, hit: true,
      };
    }
  }
  return { x: nx, y: ny, vx, vy, hit: false };
}


// Drill text format: parser and serializer. See the DSL spec in App header.


/* ---------------- inventory ---------------- */

// Canonical inventory rows (a "recipe" of what a drill needs), in display order.
// A goalie is a person, so goalie-flagged nets/tires are counted under `goalie`
// (NOT under net/tire) — the one non-obvious rule. `label`/`mark` are excluded.
const INV_KINDS = ["player", "goalie", "puck", "cone", "net", "tire", "stick", "bumper", "deker", "passer", "light"];
const INV_LABELS = {
  player: "Players", goalie: "Goalies", puck: "Pucks", cone: "Cones", net: "Nets",
  tire: "Tires", stick: "Sticks", bumper: "Bumpers", deker: "Deker gates", passer: "Rebounders", light: "Lights",
};

// Merge auto-counted pieces with stored ITEM overrides into display rows:
//   { key, label, custom, autoCount, count, hide }
// autoCount is the count on the ice; count is what's shown (an override or the
// auto count); hide drops the row from the printed table only.
function deriveInventory(pieces, items = []) {
  const isGoalie = p => (p.kind === "net" || p.kind === "tire") && p.goalie;
  const auto = {};
  (pieces || []).forEach(p => {
    if (p.kind === "label" || p.kind === "mark") return;
    const k = isGoalie(p) ? "goalie" : p.kind;
    if (!INV_KINDS.includes(k)) return;
    auto[k] = (auto[k] || 0) + 1;
  });
  const ov = k => (items || []).find(it => !it.custom && it.key === k);
  const rows = INV_KINDS.filter(k => auto[k] || ov(k)).map(k => {
    const o = ov(k) || {};
    return { key: k, label: o.label || INV_LABELS[k], custom: false,
      autoCount: auto[k] || 0, count: o.count != null ? o.count : (auto[k] || 0), hide: !!o.hide };
  });
  const custom = (items || []).filter(it => it.custom).map(it => ({
    key: it.key, label: it.label || it.key, custom: true,
    autoCount: null, count: it.count != null ? it.count : 0, hide: !!it.hide }));
  return [...rows, ...custom];
}

/* ---------------- text format ---------------- */

// Pull the drill DSL out of a markdown ```drill fenced block, so a drill pasted
// from a note or webpage round-trips. Returns the text unchanged if no fence.
function extractDrill(text) {
  const m = /```drill[^\n]*\r?\n([\s\S]*?)```/i.exec(text);
  return m ? m[1].replace(/\s+$/, "") : text;
}

// parse a run of PATH/FORK route tokens (starting at tok[j]) into a segment array.
// Shared by PATH (base routes) and FORK (light-reaction continuations).
function parseSegments(tok, j, unq) {
  const segs = [];
  let mode = "carry", dir = "fwd", stop = 0, rate = 1, name = null, waitOn = null, jump = false;
  let dsc = null, dmode = null, dsize = null, dox = null, doy = null;
  const num = () => { const v = parseFloat(tok[j++]); if (isNaN(v)) throw new Error("bad number in PATH"); return v; };
  const push = seg => {
    segs.push({ ...seg, mode, dir, stop, rate, ...(name ? { name } : {}), ...(waitOn ? { waitOn } : {}), ...(jump ? { jump: true } : {}),
      ...(dsc ? { desc: dsc } : {}), ...(dmode ? { dmode } : {}), ...(dsize != null ? { dsize } : {}),
      ...(dox != null ? { dox, doy } : {}) });
    mode = "carry"; dir = "fwd"; stop = 0; rate = 1; name = null; waitOn = null; jump = false;
    dsc = null; dmode = null; dsize = null; dox = null; doy = null;
  };
  while (j < tok.length) {
    const t = tok[j++].toUpperCase();
    if (t === "CARRY" || t === "PASS" || t === "SHOT") { mode = t.toLowerCase(); continue; }
    if (t === "FWD" || t === "BWD") { dir = t.toLowerCase(); continue; }
    if (t === "STOP") { stop = num(); continue; }
    if (t === "JUMP") { jump = true; continue; }
    if (t === "WAIT") { const on = tok[j++]; const at = parseInt(tok[j++], 10); waitOn = { on, at: (isNaN(at) ? 1 : at) - 1, mode: "waypoint" }; continue; }
    // WACT <player> <pt> — pause until that player releases the puck at <pt> (0 = any action)
    if (t === "WACT") { const on = tok[j++]; const at = parseInt(tok[j++], 10); waitOn = { on, at: (isNaN(at) || at === 0) ? null : at - 1, mode: "action" }; continue; }
    if (t === "RATE") { rate = Math.max(0.1, num()); continue; }
    if (t === "NAME") { name = (tok[j++] || "").replace(/_/g, " ").trim() || null; continue; }
    if (t === "DESC") { dsc = unq(tok[j++]) || null; continue; }        // "free text" description
    if (t === "SHOW") { const m = (tok[j++] || "").toLowerCase(); dmode = ["auto", "preso", "label"].includes(m) ? m : null; continue; }
    if (t === "SIZE") { dsize = Math.max(0.2, num()); continue; }
    if (t === "OFF") { dox = num(); doy = num(); continue; }            // label offset from the waypoint
    if (t === "L") push({ type: "L", x: num(), y: num() });
    else if (t === "Q") push({ type: "Q", cx: num(), cy: num(), x: num(), y: num() });
    else if (t === "C") push({ type: "C", c1x: num(), c1y: num(), c2x: num(), c2y: num(), x: num(), y: num() });
    else throw new Error(`unknown token "${t}" (use L Q C, PASS SHOT CARRY, FWD BWD, STOP n, RATE n)`);
  }
  return segs;
}

function parseDrill(text) {
  const pieces = [];
  const byId = {};
  let rink = "full";
  let title = "", desc = "";
  // presentation steps: authored narration beats, each anchored to an absolute
  // time (at=) or a player's waypoint activation (on=<id>:<pt>). See serializeDrill.
  const steps = [];
  // the DSL schema version the drill declares (a `DSL <n>` header). Absent → treat
  // as the current version (no back-compat gating yet); a reader may branch on it.
  let dslVersion = DSL_VERSION;
  // coaching writeup: a multi-line markdown NOTES … END NOTES block, captured
  // verbatim (see serializeDrill). `items` holds inventory overrides / custom
  // gear rows; auto counts derive from the pieces at render time.
  let notes = null, capturingNotes = false;
  const noteBuf = [];
  const items = [];
  const errors = [];
  text.split(/\r?\n/).forEach((raw, i) => {
    // NOTES block capture mode: pipe-prefixed body lines are taken verbatim
    // (no comment-strip / tokenize) until a bare `END NOTES`. The `| ` prefix on
    // every body line means a coach's own `END NOTES` line can never terminate it.
    if (capturingNotes) {
      if (raw.trim() === "END NOTES") { notes = noteBuf.join("\n"); capturingNotes = false; }
      else { const m = /^\|( (.*))?$/.exec(raw); noteBuf.push(m ? (m[2] || "") : raw); }
      return;
    }
    if (/^\s*NOTES\s*$/.test(raw)) { capturingNotes = true; noteBuf.length = 0; return; }
    // TITLE/DESC take the whole rest of the line (may contain spaces or #)
    const meta = /^\s*(title|desc)\b\s*(.*)$/i.exec(raw);
    if (meta) { if (meta[1].toLowerCase() === "title") title = meta[2].trim(); else desc = meta[2].trim(); return; }
    // pull "quoted strings" out first (label / description text) so their spaces,
    // commas and #s survive comment-stripping and tokenizing; restore via unq()
    const quotes = [];
    const protectedRaw = raw.replace(/"([^"]*)"/g, (_, s) => `${quotes.push(s.trim()) - 1}`);
    const line = protectedRaw.replace(/#(?!([0-9a-fA-F]{3}){1,2}\b).*$/, "").trim();
    if (!line) return;
    const tok = line.split(/[\s,]+/);
    const unq = t => { const m = /^(\d+)$/.exec(t || ""); return m ? quotes[+m[1]] : t; };
    const quoted = t => /^\d+$/.test(t || "");
    const cmd = tok[0].toUpperCase();
    try {
      if (cmd === "DSL") {
        const n = parseInt(tok[1], 10);
        if (isNaN(n) || n < 1) throw new Error(`DSL needs a version number, got "${tok[1] || ""}"`);
        dslVersion = n;
      } else if (cmd === "RINK") {
        const m = (tok[1] || "").toLowerCase();
        if (!VIEWS[m]) throw new Error(`unknown rink "${tok[1]}"`);
        rink = m;
      } else if (cmd === "PIECE") {
        const [, id, kind, xs, ys, ...rest] = tok;
        const x = parseFloat(xs), y = parseFloat(ys);
        if (!id || !["player", "puck", "cone", "net", "bumper", "deker", "passer", "label", "tire", "stick", "light"].includes(kind) || isNaN(x) || isNaN(y))
          throw new Error("PIECE needs: id kind x y");
        let color = kind === "cone" ? "#e0731d" : kind === "puck" ? "#14171a" : kind === "net" ? "#c81e33"
          : kind === "bumper" ? "#1b1e22" : kind === "deker" ? "#c79a4e" : kind === "passer" ? "#57636f"
          : kind === "label" ? "#14202b" : kind === "tire" ? "#1c1c1e" : kind === "stick" ? "#20242a" : kind === "light" ? "#2ea043" : "#d7263d";
        let label = kind === "player" ? id : "";
        let text = "", size = 1;                          // label piece: text + font scale
        let speed = 1, hand = "R", carrier = null, facing = 0, shotAt = null, pickup = null, rimAt = null, chipAt = null, chipAim = null, rimAim = null, chipDist = null, rimDist = null;
        let net = null, holdLine = false, goalie = false, defense = false, wait = null, group = null, crease = false;
        let cues = [], rand = true;                       // light: cue timeline + reactive (shuffle/loop) default on
        const transfers = [];
        rest.forEach(r => {
          if (quoted(r)) { text = unq(r); }              // a "quoted string" → label text
          else if (r.startsWith("#")) color = r;
          else if (r.includes("=")) {
            const [k, v] = r.split("=");
            const key = k.toLowerCase();
            if (key === "speed") {
              const n = parseFloat(v);
              if (!isNaN(n) && n > 0) speed = n;
            } else if (key === "size") {
              const n = parseFloat(v);
              if (!isNaN(n) && n > 0) size = n;
            } else if (key === "hand") hand = v.toUpperCase() === "L" ? "L" : "R";
            else if (key === "on") carrier = v;
            else if (key === "pass") {
              // pass=<pt>:<to>[@<recvPt>][^<passer>][!] — a ^passer makes it a
              // give-and-go bounced off that passer; a trailing ! is a sauce
              // (raised) pass that arcs over ice obstacles
              const m2 = /^(\d+):([^@\s^!]+)(?:@(\d+))?(?:\^([^!\s]+))?(!)?$/.exec(v);
              if (m2) transfers.push({ at: parseInt(m2[1], 10) - 1, to: m2[2],
                recvAt: m2[3] ? parseInt(m2[3], 10) - 1 : null, kind: "pass",
                ...(m2[4] ? { via: m2[4] } : {}), ...(m2[5] ? { sauce: true } : {}) });
            } else if (key === "rebound") {
              // shot whose carom is collected by a player: shoot at <pt>, they
              // gather at their @<pt> (else route end / where they stand)
              // rebound=<pt>:<to>[@<recvPt>][>net] — >net gives this rebound shot its own target
              const m4 = /^(\d+):([^@\s>]+)(?:@(\d+))?(?:>(\S+))?$/.exec(v);
              if (m4) transfers.push({ at: parseInt(m4[1], 10) - 1, to: m4[2],
                recvAt: m4[3] ? parseInt(m4[3], 10) - 1 : null, kind: "shot",
                ...(m4[4] ? { net: m4[4] } : {}) });
            } else if (key === "shoot") {
              const n = parseInt(v, 10);
              if (!isNaN(n)) shotAt = n - 1;
            } else if (key === "rim" || key === "chip") {
              // rim=<pt> / chip=<pt> is a terminal release into space; a handle
              // sets its direction (~<deg>) and distance (*<ft>). The player-handoff
              // form rim=<pt>:<player>[@<pt>] carries to a collector instead.
              const m5 = /^(\d+)(?::([^@\s~*]+)(?:@(\d+))?)?(?:~(-?\d+(?:\.\d+)?))?(?:\*(\d+(?:\.\d+)?))?$/.exec(v);
              if (m5) {
                const aim = m5[4] != null ? parseFloat(m5[4]) : null;
                const dist = m5[5] != null ? parseFloat(m5[5]) : null;
                if (m5[2]) transfers.push({ at: parseInt(m5[1], 10) - 1, to: m5[2],
                  recvAt: m5[3] ? parseInt(m5[3], 10) - 1 : null, kind: key, ...(aim != null ? { aim } : {}) });
                else if (key === "rim") { rimAt = parseInt(m5[1], 10) - 1; rimAim = aim; rimDist = dist; }
                else { chipAt = parseInt(m5[1], 10) - 1; chipAim = aim; chipDist = dist; }
              }
            } else if (key === "pickup") {
              // pickup=<player>@<pt>[*] — trailing * = a live "nearest loose puck"
              // collect that re-resolves at play time instead of a fixed puck
              const m3 = /^([^@\s]+)@(\d+)(\*)?$/.exec(v);
              if (m3) pickup = { to: m3[1], at: parseInt(m3[2], 10) - 1, ...(m3[3] ? { nearest: true } : {}) };
            } else if (key === "net") {
              net = v;                                   // a net piece id (or left/right for legacy)
            } else if (key === "hold") {
              if (v.toLowerCase() === "line") holdLine = true;
            } else if (key === "wait" || key === "act") {
              // wait=<player>[@<pt>] — hold until that player REACHES point <pt>.
              // act=<player>[@<pt>] — hold until that player RELEASES the puck
              // (pass/chip/rim/shot) at <pt>; no @<pt> = at any of their actions.
              const mw = /^([^@\s]+)(?:@(\d+))?$/.exec(v);
              if (mw) wait = { on: mw[1], mode: key === "act" ? "action" : "waypoint",
                at: mw[2] ? parseInt(mw[2], 10) - 1 : (key === "act" ? null : 0) };
            } else if (key === "face") {
              const n = parseFloat(v);
              if (!isNaN(n)) facing = n;
            } else if (key === "cues") {
              // cues=<hex>:<dur>;<hex>:<dur>… — a light's colour timeline. Hex has
              // no leading # (commas/# are stripped by tokenizing), so ; separates.
              v.split(";").forEach(seg => {
                const m6 = /^([0-9a-fA-F]{3,6}):(\d+(?:\.\d+)?)$/.exec(seg);
                if (m6) cues.push({ color: "#" + m6[1], dur: parseFloat(m6[2]) });
              });
            } else if (key === "rand") { rand = !/^(off|0|false|no)$/i.test(v); }   // light: reactive mode (default on)
            else if (key === "group") group = v.replace(/_/g, " ").trim() || null;   // named group membership
          } else if (r === "goalie") goalie = true;
          else if (r === "crease") crease = true;
          else if (r === "defense") defense = true;
          else label = r;
        });
        const p = { id, kind, x, y, color, label, text, size, speed, hand, carrier, facing, transfers, shotAt, pickup, rimAt, chipAt, chipAim, rimAim, chipDist, rimDist, net, holdLine, goalie, defense, wait, group, crease, cues, rand, forks: [], path: [] };
        pieces.push(p); byId[id] = p;
      } else if (cmd === "PATH") {
        const id = tok[1];
        const p = byId[id];
        if (!p) throw new Error(`PATH for unknown piece "${id}"`);
        p.path = parseSegments(tok, 2, unq);
      } else if (cmd === "FORK") {
        // FORK <player> <ref> [<action>[:target]] <segments…> — a light-reaction
        // continuation. `ref` is a slash-path of cue colours (hex, no leading #):
        // "green" is a top-level reaction, "green/red" the red reaction chained off
        // the green (skate) one. An optional action says what the player does on it:
        // skate (default) / shoot[:net] / chip / rim / pass:to.
        const id = tok[1], col = tok[2];
        const p = byId[id];
        if (!p) throw new Error(`FORK for unknown piece "${id}"`);
        const refParts = String(col || "").split("/");
        if (!refParts.every(h => /^[0-9a-fA-F]{3,6}$/.test(h))) throw new Error("FORK needs: id colour[/colour…] segments");
        let j = 3, action = "skate", net = null, to = null;
        const am = /^(skate|shoot|chip|rim|pass)(?::(\S+))?$/i.exec(tok[3] || "");
        if (am) { action = am[1].toLowerCase(); if (action === "shoot") net = am[2] || null; else if (action === "pass") to = am[2] || null; j = 4; }
        // navigate/create the parent chain (parents are emitted before children), add leaf
        let list = (p.forks = p.forks || []);
        for (let k = 0; k < refParts.length - 1; k++) {
          const c = "#" + refParts[k];
          let node = list.find(f => f.color.toLowerCase() === c.toLowerCase());
          if (!node) { node = { color: c, action: "skate", forks: [], path: [] }; list.push(node); }

function serializeDrill(rink, pieces, title = "", desc = "", steps = [], notes = "", items = []) {

// freehand marker annotation → a coloured polyline in its style

    if (cp.length < 3) return cp;

      const n = Math.max(2, Math.round(Math.hypot(p2.x - p1.x, p2.y - p1.y) / 0.6));

          x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3),
          y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3),
        });

/* routes + chain                                                      */
function routePath(p, pieces) {
  if (!p.path.length) return "";

  // Each segment draws in the hockey-diagram style for how it's skated: WITH the
  // puck = wiggle, backward = zigzag, otherwise a straight/curved line.
  const last = p.path.length - 1;
  const carry = pieces ? carrySegsOf(p, pieces) : new Set();
  const startTrim = trimSegStart({ x: p.x, y: p.y }, p.path[0], 3.6);
  const startPt = startTrim ? startTrim.start : { x: p.x, y: p.y };
  const stroke = `fill="none" stroke="${p.color}" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"`;
  let lines = "";
  p.path.forEach((s0, i) => {
    const segPrev = i === 0 ? startPt : { x: p.path[i - 1].x, y: p.path[i - 1].y };
    const s = i === 0 && startTrim ? startTrim.seg : s0;
    const arrow = i === last ? ' marker-end="url(#arrowR)"' : "";
    if (carry.has(i))
      lines += `<polyline points="${wigglePoints(segPrev, s, 1, i === last)}" ${stroke}${arrow}/>`;
    else
      lines += `<path d="M ${f(segPrev.x)} ${f(segPrev.y)} ${segCmd(s)}" ${stroke}${arrow}/>`;
  });

  const ev = pieces ? eventWps(p, pieces) : null;
  const dots = p.path.map((s, i) => {
    const n = ev ? ev.get(i) : i + 1;
    if (!n) return "";
    return `<circle cx="${f(s.x)}" cy="${f(s.y)}" r="2" fill="${V("panel", "#fff")}" stroke="${p.color}" stroke-width="0.5"/>`
      + `<text x="${f(s.x)}" y="${f(s.y) + 0.9}" font-size="2.6" font-weight="700" text-anchor="middle" fill="${p.color}">${n}</text>`;
  }).join("");
  return `${lines}${dots}`;
}

// puck flow lines. mode: "shot" solid dark · "rebound" dotted + distinct colour
// (so it reads apart from the shot it overlaps) · else dashed pass/rim/chip
const REBOUND_COLOR = "#e8892b";
const BLOCKED_COLOR = "#e01f2b";      // a rebound that can't reach its collector (thru a net)
// how far to hold each END (arrowhead) and START off its icon (net/player/point)
const CHAIN_TRIM = { shot: 4.6, rebound: 3, "rebound-x": 3, pass: 4 };
const CHAIN_START = { shot: 4, rebound: 3, "rebound-x": 3, pass: 4 };
const chainLine = (pts, mode) => {
  const rebound = mode === "rebound", blocked = mode === "rebound-x", shot = mode === "shot";
  const dotted = rebound || blocked;
  const color = blocked ? BLOCKED_COLOR : rebound ? REBOUND_COLOR : V("puck", "#14171a");
  const dash = shot ? "" : dotted ? ' stroke-dasharray="0.1 1.9"' : ' stroke-dasharray="2.4 2"';
  const marker = blocked ? "arrowRX" : rebound ? "arrowRB" : "arrowP";
  const line = trimLine(pts, CHAIN_START[mode] != null ? CHAIN_START[mode] : 3.5, CHAIN_TRIM[mode] != null ? CHAIN_TRIM[mode] : 3.5);
  return `<polyline points="${polyPts(line)}" fill="none" stroke="${color}" stroke-width="${shot ? 0.72 : blocked ? 0.72 : 0.6}"`

  if (!cur) return "";

  const targets = pieces.filter(q => q.kind === "net" || q.kind === "passer" || q.kind === "bumper" || q.kind === "tire");

      : routePoint(rec, tr.recvAt == null ? rec.path.length - 1 : tr.recvAt);
    lastAt[cur.id] = tr.at;                            // the passer just released here
    if (tr.via) {                                      // give-and-go off a passer: in to it, back out
      const ps = byId(tr.via);
      const pPt = ps ? { x: ps.x, y: ps.y } : launch;
      out.push(chainLine([launch, pPt], "pass"), chainLine([pPt, anchor], "pass"));
    }
    else if (tr.kind === "shot") {
      const net = shotNet(launch, tr.net != null ? tr.net : null);
      // if the carom to the collector would pass through a net, it can't get
      // there — flag that rebound red instead of drawing it as a clean carom
      const rbMode = segCrossesNet(net, anchor, netSh) ? "rebound-x" : "rebound";
      out.push(chainLine([launch, net], "shot"), chainLine([net, anchor], rbMode));
    }
    else if (tr.kind === "rim") out.push(chainLine(rimPoly(launch, tr.aim, anchor), "pass"));
    else if (tr.kind === "chip") { const h = tr.aim != null ? aimVec(tr.aim) : heading(cur, tr.at); out.push(chainLine(boards.slideTo(launch.x, launch.y, h.x, h.y, anchor), "pass")); }
    else out.push(chainLine([launch, anchor], "pass"));   // pass
    cur = rec;
  });
  if (pk.shotAt != null) { const l = routePoint(cur, pk.shotAt); out.push(chainLine([l, shotNet(l)], "shot")); }
  else if (pk.rimAt != null) { const l = routePoint(cur, pk.rimAt); out.push(chainLine(boards.rimAround(l, pk.rimDist != null ? pk.rimDist : 65, pk.rimAim), "pass")); }
  else if (pk.chipAt != null) { const l = routePoint(cur, pk.chipAt); const h = pk.chipAim != null ? aimVec(pk.chipAim) : heading(cur, pk.chipAt); out.push(chainLine(boards.slide(l.x, l.y, h.x, h.y, pk.chipDist != null ? pk.chipDist : 26), "pass")); }
  return out.join("");
}

// rink view boxes (rink feet): the DSL RINK mode crops the diagram to half /
// quarter ice, matching the editor's views


function drillSvg(dsl, opts = {}) {
  const { pieces, rink: rinkMode } = parseDrill(dsl);
  const byId = id => pieces.find(p => p.id === id);
  const rank = k => (k === "net" || k === "bumper" || k === "deker" || k === "passer" || k === "tire" || k === "stick" || k === "mark" ? 0 : k === "player" ? 2 : 1);
  const defs = `<defs>
      <clipPath id="ice"><rect x="0.6" y="0.6" width="198.8" height="83.8" rx="26"/></clipPath>
      <marker id="arrowR" markerWidth="6" markerHeight="6" refX="4.4" refY="3" orient="auto"><path d="M0.4 0.6 L5 3 L0.4 5.4 Z" fill="${V("mark", "#cf3346")}"/></marker>
      <marker id="arrowP" markerWidth="6" markerHeight="6" refX="4.4" refY="3" orient="auto"><path d="M0.4 0.6 L5 3 L0.4 5.4 Z" fill="${V("puck", "#14171a")}"/></marker>
      <marker id="arrowRB" markerWidth="6" markerHeight="6" refX="4.4" refY="3" orient="auto"><path d="M0.4 0.6 L5 3 L0.4 5.4 Z" fill="${REBOUND_COLOR}"/></marker>
      <marker id="arrowRX" markerWidth="6" markerHeight="6" refX="4.4" refY="3" orient="auto"><path d="M0.4 0.6 L5 3 L0.4 5.4 Z" fill="${BLOCKED_COLOR}"/></marker>
    </defs>`;
  const routes = pieces.map(p => routePath(p, pieces)).join("");
  const chains = pieces.filter(p => p.kind === "puck").map(pk => chain(pk, byId, pieces)).join("");
  // a carried puck draws close to its player, not at its loose stored spot
  const drawPos = p => {
    if (p.kind !== "puck" || !p.carrier) return p;
    const c = byId(p.carrier); if (!c) return p;
    const dx = p.x - c.x, dy = p.y - c.y, dd = Math.hypot(dx, dy) || 1, off = 4.2;
    return { ...p, x: c.x + dx / dd * off, y: c.y + dy / dd * off };
  };
  const icons = [...pieces].sort((a, b) => rank(a.kind) - rank(b.kind)).map(p => piece(drawPos(p))).join("");
  // text labels paint on top: standalone label pieces + "label"-mode waypoints
  const labels = pieces.filter(p => p.kind === "label").map(p => labelSvg(p.x, p.y, p.text, p.size, p.color)).join("")
    + pieces.flatMap(p => (p.path || []).filter(s => s.dmode === "label" && s.desc)
        .map(s => labelSvg(s.x + (s.dox || 0), s.y + (s.doy != null ? s.doy : -5), s.desc, s.dsize, "#14202b"))).join("");
  const wattr = opts.width ? ` width="${opts.width}"` : "";
  // crop to the drill's rink mode (full / half / quarter). Pad preserves the
  // view's aspect ratio (full ice = 200:85) so the exported image keeps true ice
  // proportions: a 7 ft vertical margin, horizontal margin scaled to match.
  const [vx, vy, vw, vh] = VIEWS[rinkMode] || VIEWS.full;
  const py = 7, px = (vw / vh) * py;
  const viewBox = `${vx - px} ${vy - py} ${vw + 2 * px} ${vh + 2 * py}`;
  // icons paint over the chain lines; arrowheads are trimmed back so they point
  // at their target instead of vanishing under a circle. Labels stay on top.
  return `<svg class="rink" viewBox="${viewBox}"${wattr} xmlns="http://www.w3.org/2000/svg" role="img">${defs}${rink()}${routes}${chains}${icons}${labels}</svg>`;
}

(function(){
  var ta=document.getElementById('dsl'),dia=document.getElementById('diagram'),err=document.getElementById('err'),
      title=document.getElementById('title'),lede=document.getElementById('lede'),leg=document.getElementById('legend'),meta=document.getElementById('meta'),
      copy=document.getElementById('copy'),printBtn=document.getElementById('print'),
      notesEl=document.getElementById('notes'),notesSec=document.getElementById('notes-sec'),
      invEl=document.getElementById('inventory'),invSec=document.getElementById('inv-sec'),
      stepsEl=document.getElementById('steps'),stepsSec=document.getElementById('steps-sec');
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  // URL-safe base64 of UTF-8 text, for sharing the current drill in the link.
  function enc(s){try{return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}catch(e){return '';}}
  function dec(s){try{s=s.replace(/-/g,'+').replace(/_/g,'/');return decodeURIComponent(escape(atob(s)));}catch(e){return null;}}
  function syncHash(){ try{ history.replaceState(null,'','#d='+enc(ta.value)); }catch(e){} }
  function render(){
    var dsl=extractDrill(ta.value),r;
    try{ r=parseDrill(dsl); dia.innerHTML=drillSvg(dsl); }
    catch(e){ err.textContent=String(e&&e.message||e); return; }
    err.textContent=r.errors.length?r.errors.join('  \u00b7  '):'';
    title.textContent=r.title||'Drill'; lede.textContent=r.desc||'';
    var players=r.pieces.filter(function(p){return p.kind==='player';});
    var L=players.map(function(p){return '<span><span class="dot" style="background:'+p.color+'"></span>'+esc(p.id)+(p.defense?' \u2014 auto-D':'')+'</span>';});
    r.pieces.filter(function(p){return p.kind==='net';}).forEach(function(p){L.push('<span><span class="dot" style="background:'+(p.goalie?'#2f9e57':p.color)+'"></span>'+esc(p.id)+(p.goalie?' \u2014 net + goalie':' \u2014 net')+'</span>');});
    L.push('<span><span class="solid"></span>skating route</span>','<span><span class="dash"></span>puck path</span>');
    leg.innerHTML=L.join('');
    meta.textContent=players.length+' skater'+(players.length===1?'':'s')+' \u00b7 live';
    // coaching notes (markdown)
    if(r.notes&&r.notes.trim()){ notesEl.innerHTML=mdBlock(r.notes); notesSec.hidden=false; } else { notesEl.innerHTML=''; notesSec.hidden=true; }
    // inventory / recipe table
    var rows=deriveInventory(r.pieces,r.items).filter(function(x){return !x.hide;});
    if(rows.length){
      invEl.innerHTML='<table class="inv"><thead><tr><th>Item</th><th>Qty</th></tr></thead><tbody>'+
        rows.map(function(x){return '<tr><td>'+esc(x.label)+'</td><td>'+x.count+'</td></tr>';}).join('')+'</tbody></table>';
      invSec.hidden=false;
    } else { invEl.innerHTML=''; invSec.hidden=true; }
    // authored presentation steps → numbered list (markdown inline)
    var st=(r.steps||[]).filter(function(s){return (s.text||'').trim();});
    if(st.length){ stepsEl.innerHTML='<ol class="steps">'+st.map(function(s){return '<li>'+mdInline(esc(s.text))+'</li>';}).join('')+'</ol>'; stepsSec.hidden=false; }
    else { stepsEl.innerHTML=''; stepsSec.hidden=true; }
    syncHash();
  }
  // A shared link carries the drill in #d=… — prefer it over the built-in default.
  if(location.hash.indexOf('#d=')===0){ var d=dec(location.hash.slice(3)); if(d!=null) ta.value=d; }
  function fallbackCopy(text){ var t=document.createElement('textarea'); t.value=text; t.setAttribute('readonly',''); t.style.position='fixed'; t.style.top='-1000px'; document.body.appendChild(t); t.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(t); }
  copy.addEventListener('click',function(){
    syncHash();
    var url=location.href, lbl=copy.querySelector('.lbl');
    function done(){ copy.classList.add('done'); lbl.textContent='Link copied'; setTimeout(function(){ copy.classList.remove('done'); lbl.textContent='Copy link'; },1600); }
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done,function(){ fallbackCopy(url); done(); }); }
    else { fallbackCopy(url); done(); }
  });
  printBtn.addEventListener('click',function(){ window.print(); });
  ta.addEventListener('input',render); render();
})();
</script>
